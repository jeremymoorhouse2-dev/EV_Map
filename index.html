<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EV Fast Charging Coverage: 2015 vs 2025</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet" />
  <link href="https://unpkg.com/mapbox-gl-compare@0.4.0/dist/mapbox-gl-compare.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="map-wrap">

  <div class="map-header">
    <h1>EV Fast Charging Coverage</h1>
    <p>Estimated 300 km coverage: 2015 vs 2025</p>
  </div>

  <div id="comparison-container">
    <div id="before" class="map"></div>
    <div id="after" class="map"></div>
  </div>

  <div class="label label-left">2015</div>
  <div class="label label-right">2025</div>

  <div class="map-legend">
  <div class="legend-title">Legend</div>

  <div class="legend-item">
    <span class="legend-fill"></span>
    <span>300 km fast-charging coverage</span>
  </div>
</div>

</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
<script src="https://unpkg.com/mapbox-gl-compare@0.4.0/dist/mapbox-gl-compare.js"></script>
<script src="script.js"></script>

</body>
</html>
